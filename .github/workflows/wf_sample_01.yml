name: Lets begin and Explore

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: Display runner inff
        run: |
          echo "Runner OS : $RUNNER_OS"
          echo "Runnr arch : $RUNNER_ARCH"
          echo "Workspace : $GITHUB_WORKSPACE"
          echo "Repository : $GITHUB_REPOSITORY"
          echo "events : $GITHUB_EVENT_NAME"
          echo "SHA : $GITHUB_SHA"

      - name: List installed tools
        run: |
          echo "=== Java ==="
          java -version 2>&1 || echo 'Not installed'
          echo "=== Node ==="
          node --version || echo 'Not installed'
          echo "=== Python ==="
          python3 --version || echo 'Not installed'
          echo "=== Docker ==="
          docker --version || echo 'Not installed'

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
     - name:  Run mock test
       run: |
        echo "Ruuning build first and then test"
        echo "success"

  notify:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()  
    steps:
      - name: Send notification
        run: echo" build and test complete  for $GITHUB_SHA"

      
     