name: Lets begin and Explore

on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Display runner inff
        run: |
          echo "Runner OS : $RUNNER_OS"
          echo "Runnr arch : $RUNNER_ARCH"
          echo "Workspace : $GITHUB_WORKSPACE"
          echo "Repository : $GITHUB_REPOSITORY"
          echo "events : $GITHUB_EVENT_NAME"
          echo "SHA : $GITHUB_SHA"